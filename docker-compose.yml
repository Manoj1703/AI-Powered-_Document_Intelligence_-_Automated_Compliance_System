services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docuagent-app
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_TOKEN: ${API_TOKEN:-}
      API_BASE_URL: ${API_BASE_URL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-before-production-2026}
      APP_ENV: ${APP_ENV:-development}
      SHOW_TRACEBACK: ${SHOW_TRACEBACK:-false}
    ports:
      - "8003:8003"
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: docuagent-mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  mongo-data:
